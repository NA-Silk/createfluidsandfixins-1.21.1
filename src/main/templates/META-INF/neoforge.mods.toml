# This is a neoforge.mods.toml file
# It contains the data relating to the loading mods
# The overall format is standard TOML format, v0.5.0. See here https://github.com/toml-lang/toml

# The name of the mod loader type to load - for regular FML @Mod mods it should blockEntity javafml
modLoader="javafml" #mandatory

# A version range to match for said mod loader - for regular FML @Mod it will blockEntity the FML version (currently 2)
loaderVersion="${loader_version_range}" #mandatory

# The license for the mod
# Allows for easier comprehension of the redistributive properties
# All rights reserved is the default copyright stance. See here https://choosealicense.com/
license="${mod_license}"

# A list of mods - how many allowed here is determined by the individual mod loader
[[mods]] #mandatory
    # The modid of the mod
    modId="${mod_id}" #mandatory
    # The version number of the mod
    version="${mod_version}" #mandatory
    # A display name for the mod
    displayName="${mod_name}" #mandatory

# A URL to refer people to when problems occur with this mod
#issueTrackerURL="https://change.me.to.your.issue.tracker.example.invalid/" #optional

# A URL to query for updates for this mod. See here https://docs.neoforged.net/docs/misc/updatechecker/
#updateJSONURL="https://change.me.example.invalid/updates.json" #optional

# A URL for the "homepage" for this mod, displayed in the mod UI
displayURL="https://github.com/NA-Silk/createfluidsandfixins-1.21.1" #optional

# A file name (in the root of the mod JAR) containing a logo for display
#logoFile="examplemod.png" #optional

# A text field displayed in the mod UI
#credits="" #optional

# The authors of the mod, displayed in the mod UI (optional)
authors="NA-Silk, Pebbbles"

# The description text for the mod (multi line!) (#mandatory)
description='''
Create: Fluids and Fixins
- Adds new fluids to extend Create fluid varieties
'''

# The [[mixins]] block declares the mixin config to FML so that it gets loaded
[[mixins]]
    config="${mod_id}.mixins.json"

# The [[accessTransformers]] block allows you to declare where your AT file is
# If this block is omitted, a fallback attempt will blockEntity made to load an AT from META-INF/accesstransformer.cfg
#[[accessTransformers]]
    #file="META-INF/accesstransformer.cfg"

# A dependency - use the . to indicate dependency for a specific modid
[[dependencies.${mod_id}]] #optional
    # The modid of the dependency
    modId="neoforge" #mandatory
    # The type of the dependency - "required", "optional", "incompatible" or "discouraged" (case-insensitive)
    type="required" #mandatory
    # Optional field describing why the dependency is required or why it is incompatible
    # reason="..."
    # The version range of the dependency
    versionRange="[${neo_version},)" #mandatory
    # An ordering relationship for the dependency.
    # BEFORE - This mod is loaded BEFORE the dependency
    # AFTER - This mod is loaded AFTER the dependency
    ordering="NONE"
    # Side this dependency is applied on - BOTH, CLIENT, or SERVER
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="[6.0.10,6.1.0)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="sable"
    type="required"
    versionRange="[1.2.2,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="create-aeronautics"
    type="optional"
    versionRange="[1.2.1,)"
    ordering="NONE"
    side="BOTH"

# Features are specific properties of the game environment
# This example declares that the mod requires GL version 3.2 or higher
#[features.${mod_id}]
#openGLVersion="[3.2,)"
